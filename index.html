<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام سوبر ماركت</title>
<style>
body{
    font-family: Arial;
    direction: rtl;
    background:#f2f2f2;
    text-align:center;
}
.container{
    width:90%;
    margin:auto;
}
input,button{
    padding:8px;
    margin:5px;
}
button{
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
}
table{
    width:100%;
    background:white;
    margin-top:20px;
    border-collapse: collapse;
}
th,td{
    border:1px solid #ccc;
    padding:10px;
}
.total{
    font-size:20px;
    margin-top:15px;
    color:red;
}
</style>
</head>
<body>

<div class="container">
<h2>🛒 نظام سوبر ماركت</h2>

<input type="text" id="name" placeholder="اسم المنتج">
<input type="number" id="price" placeholder="السعر">
<button onclick="addProduct()">إضافة منتج</button>

<table>
<thead>
<tr>
<th>المنتج</th>
<th>السعر</th>
<th>إضافة للسلة</th>
</tr>
</thead>
<tbody id="products"></tbody>
</table>

<h3>السلة</h3>
<table>
<thead>
<tr>
<th>المنتج</th>
<th>السعر</th>
</tr>
</thead>
<tbody id="cart"></tbody>
</table>

<div class="total">الإجمالي: <span id="total">0</span> ريال</div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

function save(){
localStorage.setItem("products", JSON.stringify(products));
}

function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
if(name && price){
products.push({name, price});
save();
displayProducts();
}
}

function displayProducts(){
let table = document.getElementById("products");
table.innerHTML="";
products.forEach((p,i)=>{
table.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
<td><button onclick="addToCart(${i})">إضافة</button></td>
</tr>`;
});
}

function addToCart(i){
cart.push(products[i]);
displayCart();
}

function displayCart(){
let table = document.getElementById("cart");
table.innerHTML="";
let total=0;
cart.forEach(p=>{
table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
</tr>`;
total+=parseFloat(p.price);
});
document.getElementById("total").innerText=total;
}

displayProducts();
</script>

</body>
  </html>
