<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تحذير أمني</title>

<style>
body{
    margin:0;
    padding:0;
    background:black;
    color:red;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
    animation: flash 0.5s infinite;
}

h1{
    font-size:40px;
    animation: shake 0.3s infinite;
}

@keyframes flash{
    0%{background:black;}
    50%{background:#300000;}
    100%{background:black;}
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(5px,-5px);}
    50%{transform:translate(-5px,5px);}
    75%{transform:translate(5px,5px);}
    100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<h1 id="msg">⚠️ جاري اختراق هاتفك...</h1>

<audio autoplay loop>
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script>
let messages = [
"⚠️ جاري اختراق هاتفك...",
"📡 تم نسخ جهات الاتصال...",
"📷 تم فتح الكاميرا...",
"📂 جاري نقل الملفات...",
"🚨 تم الوصول إلى النظام!"
];

let i = 0;

setInterval(()=>{
    document.getElementById("msg").innerText = messages[i];
    i = (i + 1) % messages.length;
},1000);
</script>

</body>
</html>
